    const ShareDeviceModal = ({ isOpen, onClose, hospitalId, device, nurses, currentUser, onSuccess }) => {
      const [selectedUid, setSelectedUid] = useState('');
      const [searchTerm, setSearchTerm] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        document.body.classList.toggle('modal-open', isOpen);
        if (isOpen) {
          setSelectedUid('');
          setSearchTerm('');
        }
        return () => document.body.classList.remove('modal-open');
      }, [isOpen]);

      const targets = (nurses || []).filter(n => n && n.uid && n.uid !== currentUser?.uid && !isNurseDisabled(n));
      const filteredTargets = targets.filter(n => {
        const q = searchTerm.trim().toLowerCase();
        if (!q) return true;
        return [n.name, n.email, n.uid].some(v => String(v || '').toLowerCase().includes(q));
      });

      const sendRequest = async () => {
        if (!device?.deviceId) return;
        if (!selectedUid) { window.__sg_notify('Please select a nurse.'); return; }
        const target = targets.find(t => t.uid === selectedUid);
        if (!target) { window.__sg_notify('Selected nurse not found.'); return; }
        setLoading(true);
        try {
          const requestRef = db.ref(`hospitals/${hospitalId}/handover_requests`).push();
          await requestRef.set({
            requestId: requestRef.key,
            deviceId: device.deviceId,
            fromUid: currentUser.uid,
            fromName: currentUser.name || 'Staff',
            fromEmail: currentUser.email || '',
            toUid: target.uid,
            toName: target.name || 'Staff',
            toEmail: target.email || '',
            status: 'pending',
            createdAt: Date.now()
          });
          await db.ref(`hospitals/${hospitalId}/active_devices/${device.deviceId}`).update({
            handoverRequestedBy: currentUser.uid,
            handoverRequestedByName: currentUser.name || 'Staff',
            handoverPendingTo: target.uid,
            handoverPendingToName: target.name || 'Staff',
            handoverRequestedAt: Date.now(),
            handoverStatus: 'pending'
          });
          onSuccess && onSuccess();
          onClose();
        } catch (e) {
          window.__sg_notify(e.message);
        }
        setLoading(false);
      };

      if (!isOpen) return null;

      return (
        <PortalModal open={isOpen}>
          <div className="fixed inset-0 z-[999999] bg-black/80 backdrop-blur-md flex items-center justify-center p-4 fade-in">
            <div className="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden">
              <div className="p-6 border-b border-slate-100 flex items-start justify-between gap-4">
                <div>
                  <h3 className="text-xl font-extrabold text-slate-800">Share / Handover</h3>
                  <p className="text-sm text-slate-500 mt-1">Send patient ownership to another nurse for approval.</p>
                </div>
                <button onClick={onClose} className="w-9 h-9 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center"><i className="fas fa-times"></i></button>
              </div>

              <div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto hide-scroll">
                <div className="rounded-3xl p-4 md:p-5 border border-blue-100 bg-gradient-to-br from-blue-50 via-indigo-50 to-violet-50 shadow-sm">
                  <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/80 border border-blue-100 text-[10px] font-extrabold tracking-widest uppercase text-blue-700">
                    <i className="fas fa-user-injured"></i> Patient details
                  </div>
                  <div className="mt-3 text-lg md:text-xl font-black text-slate-800 truncate">
                    {device?.patientName || `Room ${device?.room} - Bed ${device?.bed}`}
                  </div>
                  <div className="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <div className="rounded-2xl bg-white/90 border border-blue-100 px-3 py-2">
                      <div className="text-[9px] font-black uppercase tracking-widest text-blue-500">Device ID</div>
                      <div className="font-mono font-bold text-slate-800 mt-0.5 truncate">{device?.deviceId}</div>
                    </div>
                    <div className="rounded-2xl bg-white/90 border border-indigo-100 px-3 py-2">
                      <div className="text-[9px] font-black uppercase tracking-widest text-indigo-500">Room</div>
                      <div className="font-bold text-slate-800 mt-0.5 truncate">{device?.room || '-'}</div>
                    </div>
                    <div className="rounded-2xl bg-white/90 border border-violet-100 px-3 py-2">
                      <div className="text-[9px] font-black uppercase tracking-widest text-violet-500">Bed</div>
                      <div className="font-bold text-slate-800 mt-0.5 truncate">{device?.bed || '-'}</div>
                    </div>
                  </div>
                  <div className="mt-3 flex flex-wrap gap-2 text-xs font-bold">
                    <span className="px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100">Current nurse: {device?.nurseName || 'Unknown'}</span>
                    {Array.isArray(device?.nurseTrail) && device.nurseTrail.length > 1 && <span className="px-3 py-1.5 rounded-full bg-amber-50 text-amber-700 border border-amber-100">Shared nurses: {formatNurseTrail(device).join(' • ')}</span>}
                  </div>
                </div>

                <div className="relative">
                  <input
                    value={searchTerm}
                    onChange={e => setSearchTerm(e.target.value)}
                    placeholder="Search nurse by name, email, or ID..."
                    className="w-full p-3.5 pl-11 bg-slate-100 focus:bg-slate-200 rounded-2xl text-sm font-medium text-slate-700 transition-colors"
                  />
                  <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                </div>

                <div className="flex items-center justify-between gap-3">
                  <div className="font-bold text-slate-700 text-sm uppercase tracking-wider">Choose nurse</div>
                  <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{filteredTargets.length} found</div>
                </div>

                <div className="space-y-2">
                  {filteredTargets.map(n => (
                    <label key={n.uid} className={`block p-4 rounded-2xl border cursor-pointer transition-all ${selectedUid === n.uid ? 'border-blue-500 bg-blue-50' : 'border-slate-200 bg-white'}`}>
                      <div className="flex items-center gap-3">
                        <input type="radio" checked={selectedUid === n.uid} onChange={() => setSelectedUid(n.uid)} className="w-4 h-4" />
                        <div className="min-w-0">
                          <div className="font-bold text-slate-800 truncate">{n.name}</div>
                          <div className="text-xs text-slate-500 truncate">{n.email}</div>
                        </div>
                      </div>
                    </label>
                  ))}
                  {filteredTargets.length === 0 && <div className="text-center text-slate-400 py-8 border-2 border-dashed border-slate-200 rounded-2xl">No matching nurse found.</div>}
                </div>
              </div>

              <div className="p-4 border-t border-slate-100 flex gap-3">
                <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-700 font-bold">Cancel</button>
                <button onClick={sendRequest} disabled={loading || !selectedUid} className="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold disabled:opacity-50">
                  {loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Send Request'}
                </button>
              </div>
            </div>
          </div>
        </PortalModal>
      );
    };

    const HandoverRequestModal = ({ request, onAccept, onReject, nurseName }) => {
      if (!request) return null;
      return (
        <PortalModal open={!!request}>
          <div className="fixed inset-0 z-[999999] bg-black/80 backdrop-blur-md flex items-center justify-center p-4 fade-in">
            <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
              <div className="bg-gradient-to-br from-indigo-600 to-blue-600 text-white p-6">
                <div className="text-sm uppercase tracking-widest font-bold text-blue-100">Incoming handover</div>
                <h3 className="text-2xl font-extrabold mt-2">Accept this patient?</h3>
              </div>
              <div className="p-6 space-y-4">
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm">
                  <div className="font-bold text-slate-800">Patient</div>
                  <div className="text-slate-600 mt-1">{request.patientName || `Room ${request.room} - Bed ${request.bed}`}</div>
                  <div className="text-slate-600 mt-1">Device: {request.deviceId}</div>
                  <div className="text-slate-600 mt-1">From: {request.fromName}</div>
                  <div className="text-slate-600 mt-1">To: {nurseName}</div>
                </div>
                <p className="text-sm text-slate-500">After accepting, this nurse gets full control of the patient monitoring card.</p>
              </div>
              <div className="p-4 border-t border-slate-100 flex gap-3">
                <button onClick={onReject} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-700 font-bold">Reject</button>
                <button onClick={onAccept} className="flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold">Accept</button>
              </div>
            </div>
          </div>
        </PortalModal>
      );
    };

    const DischargeConfirmModal = ({ open, device, onCancel, onConfirm, loading = false, title = 'Discharge patient' }) => {
      if (!open || !device) return null;
      const trail = formatNurseTrail(device);
      const completionLabel = device?.patientName || `Room ${device?.room || '-'} - Bed ${device?.bed || '-'}`;
      return (
        <PortalModal open={open}>
          <div className="fixed inset-0 z-[999999] bg-black/70 backdrop-blur-md flex items-center justify-center p-4 fade-in">
            <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
              <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 text-white p-6">
                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/10 text-[10px] font-extrabold tracking-widest uppercase text-blue-200">
                  <i className="fas fa-triangle-exclamation"></i> Confirmation
                </div>
                <h3 className="text-2xl font-extrabold mt-4">{title}</h3>
                <p className="text-sm text-slate-300 mt-2">This will move the patient into history and stop live monitoring.</p>
              </div>
              <div className="p-5 md:p-6 space-y-4">
                <div className="rounded-3xl p-4 border border-blue-100 bg-gradient-to-br from-blue-50 via-indigo-50 to-violet-50">
                  <div className="text-[10px] font-black uppercase tracking-widest text-blue-600">Patient summary</div>
                  <div className="mt-2 text-xl font-black text-slate-800">{completionLabel}</div>
                  <div className="mt-3 grid grid-cols-2 gap-2 text-sm">
                    <div className="rounded-2xl bg-white border border-blue-100 px-3 py-2">
                      <div className="text-[9px] font-black uppercase tracking-widest text-blue-500">Device</div>
                      <div className="font-mono font-bold text-slate-800 mt-0.5 truncate">{device?.deviceId}</div>
                    </div>
                    <div className="rounded-2xl bg-white border border-indigo-100 px-3 py-2">
                      <div className="text-[9px] font-black uppercase tracking-widest text-indigo-500">Room / Bed</div>
                      <div className="font-bold text-slate-800 mt-0.5 truncate">{device?.room || '-'} / {device?.bed || '-'}</div>
                    </div>
                  </div>
                  <div className="mt-3 flex flex-wrap gap-2">
                    <span className="px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs font-bold">
                      Current nurse: {device?.nurseName || 'Unknown'}
                    </span>
                    {trail.length > 1 && (
                      <span className="px-3 py-1.5 rounded-full bg-violet-50 text-violet-700 border border-violet-100 text-xs font-bold">
                        Team: {trail.join(' • ')}
                      </span>
                    )}
                    {device?.completedByName && (
                      <span className="px-3 py-1.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200 text-xs font-bold">
                        Closed by {trailEntryLabel({ name: device.completedByName, role: device.completedByRole })}
                      </span>
                    )}
                  </div>
                </div>
                <p className="text-sm text-slate-500 leading-6">Press confirm to discharge now, or cancel to keep monitoring active.</p>
              </div>
              <div className="p-4 border-t border-slate-100 flex gap-3">
                <button onClick={onCancel} className="flex-1 py-3.5 rounded-xl bg-slate-100 text-slate-700 font-bold">Cancel</button>
                <button onClick={onConfirm} disabled={loading} className="flex-1 py-3.5 rounded-xl bg-indigo-600 text-white font-bold disabled:opacity-60">
                  {loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Confirm'}
                </button>
              </div>
            </div>
          </div>
        </PortalModal>
      );
    };

    const HospitalDashboard = ({ hospitalId, userRole, isSuperView = false }) => {
      const [hospitalMeta, setHospitalMeta] = useState(null);
      const [activeData, setActiveData] = useState({});
      const [historyData, setHistoryData] = useState({});
      const [nursesData, setNursesData] = useState({});
      const [devicesData, setDevicesData] = useState({});
      const [tab, setTab] = useState('active');
      const [showAddNurse, setShowAddNurse] = useState(false);
      const [showEditNurse, setShowEditNurse] = useState(false);
      const [showAddDevice, setShowAddDevice] = useState(false);
      const [selectedNurse, setSelectedNurse] = useState(null);
      const [toast, setToast] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterPeriod, setFilterPeriod] = useState('day');
      const [visibleCounts, setVisibleCounts] = useState({ active: 24, history: 24, nurses: 24, devices: 24 });
      const [pendingDischarge, setPendingDischarge] = useState(null);
      const [pendingDischargeLoading, setPendingDischargeLoading] = useState(false);

      const userEmail = auth.currentUser ? auth.currentUser.email : '';
      const hospitalInfo = getHospitalInfo(userEmail);

      useEffect(() => {
        const metaRef = db.ref(`hospitals/${hospitalId}`);
        const metaHandler = snap => {
          const val = snap.val() || {};
          setHospitalMeta({
            name: val.name || hospitalInfo.name,
            location: val.location || hospitalInfo.loc,
            createdAt: val.createdAt || Date.now(),
          });
        };
        metaRef.on('value', metaHandler);

        metaRef.once('value').then(async snap => {
          if (!snap.exists() && userRole === 'admin') {
          } else if (snap.exists()) {
            const val = snap.val() || {};
            const updates = {};
            if (!val.createdAt) updates.createdAt = Date.now();
            if (!val.handover_requests) updates.handover_requests = {};
            if (Object.keys(updates).length) metaRef.update(updates);
          }
        });

        const activeRef = metaRef.child('active_devices');
        const historyRef = metaRef.child('history');
        const nursesRef = metaRef.child('nurses');
        const devicesRef = metaRef.child('registered_devices');
        const activeHandler = snap => setActiveData(stampReceivedAt(snap.val() || {}));
        const historyHandler = snap => setHistoryData(snap.val() || {});
        const nursesHandler = snap => setNursesData(snap.val() || {});
        const devicesHandler = snap => setDevicesData(snap.val() || {});
        activeRef.on('value', activeHandler);
        historyRef.on('value', historyHandler);
        nursesRef.on('value', nursesHandler);
        devicesRef.on('value', devicesHandler);

        return () => {
          metaRef.off('value', metaHandler);
          activeRef.off('value', activeHandler);
          historyRef.off('value', historyHandler);
          nursesRef.off('value', nursesHandler);
          devicesRef.off('value', devicesHandler);
        };
      }, [hospitalId, hospitalInfo.name, hospitalInfo.loc, userRole]);

      const activeDevs = useMemo(() => sortActiveDevices(Object.values(activeData || {})), [activeData]);
      const historyDevs = useMemo(() => sortHistoryDesc(Object.values(historyData || {})), [historyData]);
      const nurses = useMemo(() => Object.values(nursesData || {}), [nursesData]);
      const registeredDevices = useMemo(() => Object.values(devicesData || {}), [devicesData]);
      const totalRegisteredDevices = registeredDevices.length;

      const handleDischarge = async (device) => {
        if (!device?.deviceId) return;
        setPendingDischarge(device);
      };

      const confirmPendingDischarge = async () => {
        const device = pendingDischarge;
        if (!device?.deviceId) return;
        setPendingDischargeLoading(true);
        try {
          const ok = await claimAndArchiveDevice(
            hospitalId,
            device.deviceId,
            'manual',
            { autoDischarged: false },
            { uid: auth.currentUser?.uid || 'admin', name: userEmail || 'Admin', role: 'admin' }
          );
          if (!ok) window.__sg_notify('Discharge could not be completed. Please try again.');
          else setPendingDischarge(null);
        } finally {
          setPendingDischargeLoading(false);
        }
      };

      const handleToggleNurseStatus = async (nurse) => {
        const uid = nurse.uid;
        const currentlyDisabled = isNurseDisabled(nurse);
        if (!uid) return;

        if (!currentlyDisabled) {
          const activeCount = Object.values(activeData || {}).filter(dev => dev?.nurseId === uid).length;
          const message = activeCount > 0 ? `This staff member is handling ${activeCount} active patient(s). Disabling will stop login immediately. Continue?` : `Disable this staff member now?`;
          if (!(await window.__sg_confirm(message, 'Disable Staff Member'))) return;
          try {
            await db.ref(`hospitals/${hospitalId}/nurses/${uid}`).update({ disabled: true, disabledAt: Date.now(), disabledBy: userEmail || 'admin' });
            setToast({ type: 'success', msg: 'Staff disabled' });
            setTimeout(() => setToast(null), 2000);
          } catch (e) { window.__sg_notify(e.message); }
        } else {
          if (!(await window.__sg_confirm('Re-enable this staff member now?', 'Enable Staff Member'))) return;
          try {
            await db.ref(`hospitals/${hospitalId}/nurses/${uid}`).update({ disabled: false, disabledAt: null, disabledBy: null });
            setToast({ type: 'success', msg: 'Staff enabled' });
            setTimeout(() => setToast(null), 2000);
          } catch (e) { window.__sg_notify(e.message); }
        }
      };

      const handleDeleteDevice = async (did) => {
        if (!(await window.__sg_confirm(`Remove device ${did} from your inventory? Nurses will no longer be able to activate it.`, 'Remove Device'))) return;
        try {
          await db.ref(`hospitals/${hospitalId}/registered_devices/${did}`).remove();
          setToast({ type: 'success', msg: 'Device removed' });
          setTimeout(()=>setToast(null), 2000);
        } catch (e) { window.__sg_notify(e.message); }
      };

      if (!hospitalMeta) return <div className="p-12 text-center text-slate-400 font-medium animate-pulse">Syncing Hospital Data...</div>;

      const now = new Date();
      const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const todayDischarges = historyDevs.filter(h => (h.completedAt || 0) >= startOfDay);

      const filterData = (list) => {
        if (!searchTerm) return list;
        const lower = searchTerm.toLowerCase();
        return list.filter(item => {
          const pName = item.patientName ? item.patientName.toLowerCase() : '';
          const dId = item.deviceId ? item.deviceId.toLowerCase() : '';
          const nName = item.nurseName ? item.nurseName.toLowerCase() : '';
          const rNum = item.room ? item.room.toLowerCase() : '';
          const bNum = item.bed ? item.bed.toLowerCase() : '';
          const n = item.name ? item.name.toLowerCase() : '';
          const e = item.email ? item.email.toLowerCase() : '';
          return (pName.includes(lower) || dId.includes(lower) || nName.includes(lower) || rNum.includes(lower) || bNum.includes(lower) || n.includes(lower) || e.includes(lower));
        });
      };

      const filteredActive = filterData(activeDevs);
      const filteredHistory = filterHistoryByTime(filterData(historyDevs), filterPeriod);
      const filteredNurses = filterData(nurses);
      const filteredDevices = filterData(registeredDevices);

      return (
        <div className="space-y-5 md:space-y-6 fade-in w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          {toast && <Toast {...toast} />}
          <div className="bg-white p-2.5 rounded-2xl shadow-sm border border-slate-200 flex items-center mb-5 md:mb-6">
            <i className="fas fa-search text-slate-400 ml-3"></i>
            <input type="text" placeholder="Search Patients, Devices, Staff..." className="w-full p-2 outline-none text-sm text-slate-700 ml-2 font-medium bg-transparent" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 md:gap-5">
            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-100 shadow-sm">
              <div className="flex items-center gap-2 md:gap-3 mb-2">
                <div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shrink-0"><i className="fas fa-procedures text-xs md:text-base"></i></div>
                <div className="text-[9px] md:text-[11px] font-extrabold text-slate-400 uppercase tracking-widest truncate">Active Now</div>
              </div>
              <div className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">{activeDevs.length}</div>
            </div>
            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-100 shadow-sm">
              <div className="flex items-center gap-2 md:gap-3 mb-2">
                <div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0"><i className="fas fa-clipboard-check text-xs md:text-base"></i></div>
                <div className="text-[9px] md:text-[11px] font-extrabold text-slate-400 uppercase tracking-widest truncate">Discharged (Today)</div>
              </div>
              <div className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">{todayDischarges.length}</div>
            </div>
            <div className="bg-white p-4 md:p-6 rounded-2xl border border-slate-100 shadow-sm">
              <div className="flex items-center gap-2 md:gap-3 mb-2">
                <div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center shrink-0"><i className="fas fa-microchip text-xs md:text-base"></i></div>
                <div className="text-[9px] md:text-[11px] font-extrabold text-slate-400 uppercase tracking-widest truncate">Registered Devices</div>
              </div>
              <div className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">{totalRegisteredDevices}</div>
            </div>
          </div>

          <div className="flex gap-6 border-b border-slate-200 mt-6 md:mt-8 px-1 overflow-x-auto hide-scroll">
            {['active', 'history', 'nurses', 'devices'].map(t => (
              <button key={t} onClick={()=>setTab(t)} className={`pb-3 text-xs md:text-sm font-extrabold uppercase tracking-wider transition-all border-b-2 whitespace-nowrap ${tab===t ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-400'}`}>
                {t === 'devices' ? 'Inventory' : t}
              </button>
            ))}
          </div>

          <div className="min-h-[300px] pt-4">
            {tab === 'active' && (
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5">
                {filteredActive.slice(0, visibleCounts.active).map((d, i) => <StatusCard key={d.deviceId || `${d.room || 'room'}-${d.bed || 'bed'}-${d.startTime || 'time'}-${i}`} data={d} onComplete={handleDischarge} />)}
                {filteredActive.length === 0 && <div className="col-span-full py-16 text-center text-slate-400 font-medium bg-white rounded-2xl border border-dashed border-slate-200 text-sm">No active infusions right now.</div>}
                {filteredActive.length > visibleCounts.active && <div className="col-span-full flex justify-center"><button onClick={() => setVisibleCounts(prev => ({ ...prev, active: prev.active + 24 }))} className="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-bold">Load more patients</button></div>}
              </div>
            )}

            {tab === 'history' && (
              <div>
                <FilterTabs current={filterPeriod} onChange={setFilterPeriod} resultCount={filteredHistory.length} />
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5 opacity-90">
                  {filteredHistory.slice(0, visibleCounts.history).map((d, i) => <StatusCard key={d.historyId || `${d.deviceId || 'hist'}-${d.completedAt || d.startTime || i}-${i}`} data={d} isHistory={true} />)}
                  {filteredHistory.length === 0 && <div className="col-span-full py-16 text-center text-slate-400 font-medium bg-white rounded-2xl border border-dashed border-slate-200 text-sm">No history records found for this period.</div>}
                  {filteredHistory.length > visibleCounts.history && <div className="col-span-full flex justify-center"><button onClick={() => setVisibleCounts(prev => ({ ...prev, history: prev.history + 24 }))} className="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-bold">Load more history</button></div>}
                </div>
              </div>
            )}

            {tab === 'nurses' && (
              <div>
                {!isSuperView && <button onClick={() => setShowAddNurse(true)} className="mb-5 bg-slate-900 active:bg-slate-800 text-white px-5 py-3 rounded-xl font-bold text-sm shadow-md transition-all flex items-center justify-center gap-2 w-full md:w-auto border-none outline-none"><i className="fas fa-plus"></i> Add Staff Member</button>}
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5">
                  {filteredNurses.map((n, i) => {
                    const disabled = isNurseDisabled(n);
                    const activeCount = Object.values(activeData || {}).filter(dev => dev?.nurseId === n.uid).length;
                    return (
                      <div key={n.uid || n.email || `${n.name || 'staff'}-${i}`} className={`bg-white p-4 md:p-5 rounded-2xl border shadow-sm flex flex-col justify-between ${disabled ? 'border-amber-300 bg-amber-50/30' : 'border-slate-200'}`}>
                        <div className="flex items-center gap-3 md:gap-4">
                          <div className={`w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center font-extrabold text-base md:text-lg shrink-0 ${disabled ? 'bg-amber-100 text-amber-700' : 'bg-gradient-to-br from-blue-100 to-indigo-100 text-blue-700'}`}>{(n.name || '?').charAt(0).toUpperCase()}</div>
                          <div className="min-w-0 flex-1">
                            <div className="font-extrabold text-slate-800 text-sm md:text-base truncate">{n.name}</div>
                            <div className="text-[10px] md:text-xs font-medium text-slate-500 mt-0.5 truncate">{n.email}</div>
                            <div className="mt-1 flex flex-wrap gap-2 items-center">
                              {disabled ? <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-amber-100 text-amber-700 border border-amber-200">Disabled</span> : <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-emerald-100 text-emerald-700 border border-emerald-200">Active</span>}
                              {activeCount > 0 && <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-blue-50 text-blue-700 border border-blue-100">{activeCount} patient(s)</span>}
                            </div>
                          </div>
                        </div>
                        {!isSuperView && (
                          <div className="flex gap-2 mt-4 pt-3 border-t border-slate-100">
                            <button onClick={() => { setSelectedNurse(n); setShowEditNurse(true); }} className="flex-1 bg-slate-50 active:bg-slate-100 text-slate-600 text-[11px] md:text-xs font-bold py-2.5 rounded-lg transition-colors border-none outline-none">Edit</button>
                            <button onClick={() => handleToggleNurseStatus(n)} className={`flex-1 text-[11px] md:text-xs font-bold py-2.5 rounded-lg transition-colors border-none outline-none ${disabled ? 'bg-emerald-50 active:bg-emerald-100 text-emerald-700' : 'bg-red-50 active:bg-red-100 text-red-600'}`}>{disabled ? 'Enable' : 'Disable'}</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {filteredNurses.length === 0 && <div className="text-slate-400 col-span-full py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl text-sm">No staff registered.</div>}
                </div>
              </div>
            )}

            {tab === 'devices' && (
              <div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-5">
                  <div className="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                    <div className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Registered Devices</div>
                    <div className="mt-2 font-black text-slate-800 text-xl">{totalRegisteredDevices}</div>
                  </div>
                  <div className="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                    <div className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Active In Use</div>
                    <div className="mt-2 font-black text-slate-800 text-xl">{Object.keys(activeData || {}).length}</div>
                  </div>
                  <div className="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                    <div className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Started Today</div>
                    <div className="mt-2 font-black text-slate-800 text-xl">{Object.values(activeData || {}).filter(d => (d.startTime || 0) >= new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate()).getTime()).length}</div>
                  </div>
                </div>

                {isSuperView && <button onClick={() => setShowAddDevice(true)} className="mb-5 bg-indigo-600 active:bg-indigo-700 text-white px-5 py-3 rounded-xl font-bold text-sm shadow-md transition-all flex items-center justify-center gap-2 w-full md:w-auto border-none outline-none"><i className="fas fa-microchip"></i> Register New Device to Hospital</button>}
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5">
                  {filteredDevices.map((dev, i) => {
                    const isActive = !!activeData?.[dev.deviceId];
                    const isDeviceOn = dev.lastSeen && (Date.now() - dev.lastSeen < 30000);
                    return (
                      <div key={dev.deviceId || `${dev.addedAt || 'added'}-${i}`} className="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                        <div className="flex justify-between items-start mb-2 gap-3">
                          <div className="flex items-center gap-3 min-w-0">
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${isDeviceOn ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                              <i className="fas fa-satellite-dish text-lg"></i>
                            </div>
                            <div className="min-w-0">
                              <div className="font-mono font-bold text-slate-800 text-sm md:text-base truncate">{dev.deviceId}</div>
                              <div className="text-[10px] text-slate-400 mt-0.5">Started using: {new Date(dev.startedAt || dev.addedAt || Date.now()).toLocaleDateString('en-IN')}</div>
                            </div>
                          </div>
                          <div className={`px-2 py-1 rounded-md text-[10px] font-bold tracking-wider uppercase border shrink-0 ${isActive ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>{isActive ? 'In Use' : 'Idle'}</div>
                        </div>
                        {isSuperView && <div className="mt-4 pt-3 border-t border-slate-100 flex justify-end"><button onClick={() => handleDeleteDevice(dev.deviceId)} className="bg-red-50 active:bg-red-100 text-red-600 text-[11px] font-bold px-4 py-2 rounded-lg transition-colors border-none outline-none">Remove Device</button></div>}
                      </div>
                    );
                  })}
                  {filteredDevices.length === 0 && <div className="text-slate-400 col-span-full py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl text-sm">No devices in hospital inventory.</div>}
                </div>
              </div>
            )}
          </div>

          <AddNurseModal isOpen={showAddNurse} onClose={()=>setShowAddNurse(false)} hospitalId={hospitalId} hospitalDomain={hospitalInfo.domain} onSuccess={() => { setToast({type: 'success', msg: 'Staff Added'}); setTimeout(()=>setToast(null), 2000); }} />
          <EditNurseModal isOpen={showEditNurse} onClose={()=>setShowEditNurse(false)} hospitalId={hospitalId} currentNurse={selectedNurse} onSuccess={() => { setToast({type: 'success', msg: 'Staff Updated'}); setTimeout(()=>setToast(null), 2000); }} />
          <AddDeviceModal isOpen={showAddDevice} onClose={()=>setShowAddDevice(false)} hospitalId={hospitalId} onSuccess={() => { setToast({type: 'success', msg: 'Device Registered'}); setTimeout(()=>setToast(null), 2000); }} />
          <DischargeConfirmModal
            open={!!pendingDischarge}
            device={pendingDischarge}
            onCancel={() => setPendingDischarge(null)}
            onConfirm={confirmPendingDischarge}
            loading={pendingDischargeLoading}
            title="Discharge patient"
          />
        </div>
      );
    };

    const NurseApp = ({ user, onLogout }) => {
      const { id: hid, name: hName } = getHospitalInfo(user.email);
      const [activeData, setActiveData] = useState({});
      const [historyData, setHistoryData] = useState({});
      const [nursesData, setNursesData] = useState({});
      const [tab, setTab] = useState('active');
      const [filterPeriod, setFilterPeriod] = useState('day');
      const [historySearch, setHistorySearch] = useState('');
      const [nurseName, setNurseName] = useState('');
      const [showAdd, setShowAdd] = useState(false);
      const [toast, setToast] = useState(null);
      const [visibleCounts, setVisibleCounts] = useState({ active: 24, history: 24 });
      const [shareTarget, setShareTarget] = useState(null);
      const [handoverRequest, setHandoverRequest] = useState(null);
      const [pendingDischarge, setPendingDischarge] = useState(null);
      const [pendingDischargeLoading, setPendingDischargeLoading] = useState(false);
      const prevStateRef = useRef({});
      const prevAlertRef = useRef({});
      const listenedRequestIdsRef = useRef(new Set());

      useEffect(() => {
        try {
          if ("Notification" in window && window.Notification && Notification.permission !== "granted" && Notification.permission !== "denied") {
            const req = Notification.requestPermission();
            if (req && req.catch) req.catch(()=>{});
          }
        } catch(e) {}
      }, []);

      useEffect(() => {
        const hRef = db.ref(`hospitals/${hid}`);
        const activeRef = hRef.child('active_devices');
        const historyRef = hRef.child('history');
        const nurseProfileRef = hRef.child(`nurses/${user.uid}`);
        const nursesRef = hRef.child('nurses');
        const requestsRef = hRef.child('handover_requests');

        const nurseHandler = snap => {
          if (!snap.exists()) {
            window.__sg_notify('Your account has been removed by admin.');
            auth.signOut();
            return;
          }
          const nurseVal = snap.val() || {};
          if (isNurseDisabled(nurseVal)) {
            window.__sg_notify('Your account has been disabled by admin.');
            auth.signOut();
            return;
          }
          setNurseName(nurseVal.name || '');
        };
        const activeHandler = snap => { setActiveData(stampReceivedAt(snap.val() || {})); };
        const historyHandler = snap => {
          const h = [];
          snap.forEach(c => { if (c.val().nurseId === user.uid) h.push(c.val()); });
          setHistoryData(sortHistoryDesc(h));
        };
        const nursesHandler = snap => setNursesData(snap.val() || {});
        const requestsHandler = snap => {
          const all = snap.val() || {};
          const pending = Object.values(all).filter(r => r && r.toUid === user.uid && r.status === 'pending');
          if (pending.length) {
            const latest = pending.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0))[0];
            if (latest && latest.requestId && !listenedRequestIdsRef.current.has(latest.requestId)) {
              listenedRequestIdsRef.current.add(latest.requestId);
              setHandoverRequest(latest);
            }
          }
        };

        nurseProfileRef.on('value', nurseHandler);
        activeRef.on('value', activeHandler);
        historyRef.on('value', historyHandler);
        nursesRef.on('value', nursesHandler);
        requestsRef.on('value', requestsHandler);

        return () => {
          nurseProfileRef.off('value', nurseHandler);
          activeRef.off('value', activeHandler);
          historyRef.off('value', historyHandler);
          nursesRef.off('value', nursesHandler);
          requestsRef.off('value', requestsHandler);
        };
      }, [hid, user.uid]);

      const userDevices = useMemo(() => sortActiveDevices(Object.values(activeData || {}).filter(dev => dev && dev.nurseId === user.uid)), [activeData, user.uid]);
      const nurses = useMemo(() => Object.values(nursesData || {}), [nursesData]);

      useEffect(() => {
        if (!ENABLE_ADMIN_NOTIFICATIONS) return;
        const now = Date.now();
        Object.values(activeData || {}).forEach((dev) => {
          const did = dev?.deviceId;
          if (!did || dev.nurseId !== user.uid) return;
          const totalMl = Math.max(100, safeNum(dev.totalMl, DEFAULT_TOTAL_ML));
          const currentPerc = getDevicePercent(dev);
          const currentMl = getDeviceMlRemaining(dev);
          const currentRemainingMs = getRemainingMs(dev);
          const lastSeenAt = getDeviceLastSeenAt(dev) || now;
          const prev = prevStateRef.current[did] || {};
          const prevAlert = prevAlertRef.current[did] || { perc: prev.perc !== undefined ? prev.perc : 100, ml: prev.ml !== undefined ? prev.ml : totalMl, remainingMs: prev.remainingMs !== undefined ? prev.remainingMs : INFUSION_DURATION_MS, lastUpdate: lastSeenAt };
          const settings = dev.notificationSettings || {};
          const notifyByPercent = settings.mode === 'percent' || settings.mode === 'both' || !settings.mode;
          const notifyByMl = settings.mlAlerts !== false;
          const percentPrefs = settings.percentAlerts || DEFAULT_PERCENT_ALERTS;
          const mlThresholds = generateMlThresholds(totalMl);
          const lastChangeAt = prev.lastChangeAt || lastSeenAt;
          const alertState = { ...(prev.alertState || {}) };

          if (currentPerc !== prev.perc || currentMl !== prev.ml) alertState.noFlow = false;
          if (currentPerc <= 1 && !alertState.empty) { triggerPatientAlert({ title: `Bottle empty: ${dev.patientName || `Room ${dev.room}`}`, body: `Remaining ${formatMl(currentMl)} (${currentPerc}%). Please discharge now.` }); alertState.empty = true; }
          if (now - lastSeenAt > OFFLINE_ALERT_MS && !alertState.offline) { triggerPatientAlert({ title: `Device Offline: ${dev.patientName || `Room ${dev.room}`}`, body: `No update received for more than ${Math.round(OFFLINE_ALERT_MS / 1000)} seconds.` }); alertState.offline = true; }
          if (currentPerc === prev.perc && (now - lastChangeAt) > NO_FLOW_ALERT_MS && !alertState.noFlow) { triggerPatientAlert({ title: `No flow detected: ${dev.patientName || `Room ${dev.room}`}`, body: 'Sensor looks stuck or infusion has stopped updating.' }); alertState.noFlow = true; }
          if (prev.perc !== undefined && (prev.perc - currentPerc) >= RAPID_DROP_PERCENT && (now - (prev.lastUpdate || lastSeenAt)) <= 120000 && !alertState.rapidDrop) { triggerPatientAlert({ title: `Rapid drop detected: ${dev.patientName || `Room ${dev.room}`}`, body: 'Possible leak or disconnection detected.' }); alertState.rapidDrop = true; }

          let triggered = null;
          if (notifyByPercent) {
            for (let t of ALERT_LEVELS) {
              const enabled = percentPrefs[t] !== false && percentPrefs[String(t)] !== false;
              if (enabled && (prevAlert.perc > t) && currentPerc <= t) { triggered = { type: 'percent', value: t }; break; }
            }
          }
          if (!triggered && notifyByMl) {
            for (let t of mlThresholds) {
              if ((prevAlert.ml > t) && currentMl <= t) { triggered = { type: 'ml', value: t }; break; }
            }
          }
          if (triggered) {
            const liveMins = dev.minsLeft !== undefined ? Number(dev.minsLeft) : null;
            const liveSecs = dev.secsLeft !== undefined ? Number(dev.secsLeft) : 0;
            let etaText = 'scheduled time';
            if (liveMins !== null && liveMins < 999) etaText = new Date(Date.now() + (liveMins * 60000) + (liveSecs * 1000)).toLocaleTimeString('en-IN', { hour12: true, hour: '2-digit', minute: '2-digit' });
            const label = triggered.type === 'ml' ? `${triggered.value}ml left` : `${triggered.value}% reached`;
            triggerPatientAlert({
              title: `Saline Alert: ${dev.patientName || `Room ${dev.room}`}`,
              body: `${label}. Remaining ${formatMl(currentMl)} (${currentPerc}%). ETA ${etaText}.`
            });
          }

          prevStateRef.current[did] = { perc: currentPerc, ml: currentMl, remainingMs: currentRemainingMs, lastUpdate: lastSeenAt, lastChangeAt: currentPerc === prev.perc && currentMl === prev.ml ? lastChangeAt : now, alertState };
          prevAlertRef.current[did] = { perc: currentPerc, ml: currentMl, remainingMs: currentRemainingMs };
        });
      }, [activeData, user.uid]);

      useEffect(() => {
        const scanForAutoDischarge = async () => {
          const now = Date.now();
          for (const dev of userDevices) {
            if (!dev?.deviceId || dev.completionLock) continue;
            const dueAt = dev.autoDischargeAt || ((dev.startTime || now) + INFUSION_DURATION_MS);
            if (now >= dueAt) await claimAndArchiveDevice(hid, dev.deviceId, 'auto', {}, { uid: 'system', name: 'System', role: 'system' });
          }
        };
        scanForAutoDischarge();
        const id = setInterval(scanForAutoDischarge, 30000);
        return () => clearInterval(id);
      }, [hid, userDevices]);

      const handleComplete = async (device) => {
        if (!device?.deviceId) return;
        setPendingDischarge(device);
      };

      const confirmPendingDischarge = async () => {
        const device = pendingDischarge;
        if (!device?.deviceId) return;
        setPendingDischargeLoading(true);
        try {
          const ok = await claimAndArchiveDevice(
            hid,
            device.deviceId,
            'manual',
            { autoDischarged: false },
            { uid: user.uid, name: nurseName || user.email.split('@')[0], role: 'nurse' }
          );
          if (!ok) window.__sg_notify('Discharge could not be completed. Please try again.');
          else setPendingDischarge(null);
        } finally {
          setPendingDischargeLoading(false);
        }
      };

      const openShare = (device) => setShareTarget(device);

      const acceptHandover = async () => {
        const req = handoverRequest;
        if (!req) return;
        try {
          const nurseSnap = await db.ref(`hospitals/${hid}/nurses/${user.uid}`).once('value');
          const nurseVal = nurseSnap.val() || {};
          const activeSnap = await db.ref(`hospitals/${hid}/active_devices/${req.deviceId}`).once('value');
          const activeVal = activeSnap.val() || {};
          const updatedTrail = mergeTrail(activeVal.nurseTrail || [], makeTrailEntry({ uid: user.uid, name: nurseVal.name || nurseName || user.email.split('@')[0], email: user.email }, nurseVal.role || 'nurse'));
          await db.ref(`hospitals/${hid}/active_devices/${req.deviceId}`).update({
            nurseId: user.uid,
            nurseName: nurseVal.name || nurseName || user.email.split('@')[0],
            nurseTrail: updatedTrail,
            handoverAcceptedBy: user.uid,
            handoverAcceptedByName: nurseVal.name || nurseName || user.email.split('@')[0],
            handoverAcceptedAt: Date.now(),
            handoverPendingTo: null,
            handoverPendingToName: null,
            handoverStatus: 'accepted'
          });
          await db.ref(`hospitals/${hid}/handover_requests/${req.requestId}`).update({ status: 'accepted', acceptedAt: Date.now(), acceptedBy: user.uid });
          setToast({ type: 'success', msg: 'Handover accepted' });
          setTimeout(()=>setToast(null), 2000);
          setHandoverRequest(null);
        } catch (e) {
          window.__sg_notify(e.message);
        }
      };

      const rejectHandover = async () => {
        const req = handoverRequest;
        if (!req) return;
        try {
          await db.ref(`hospitals/${hid}/handover_requests/${req.requestId}`).update({ status: 'rejected', rejectedAt: Date.now(), rejectedBy: user.uid });
          await db.ref(`hospitals/${hid}/active_devices/${req.deviceId}`).update({
            handoverPendingTo: null,
            handoverPendingToName: null,
            handoverStatus: 'rejected'
          });
        } catch (e) {}
        setHandoverRequest(null);
      };

      const filteredHistory = filterHistoryByTime(Object.values(historyData || {}).filter(item => {
        if (!historySearch.trim()) return true;
        const q = historySearch.toLowerCase().trim();
        return [item.patientName, item.room, item.bed, item.deviceId, item.nurseName].some(v => String(v || '').toLowerCase().includes(q));
      }), filterPeriod);

      return (
        <div className="min-h-screen pb-24 fade-in">
          {toast && <Toast {...toast} />}
          <AppHeader title={hName} subtitle={`Staff: ${nurseName || user.email.split('@')[0]}`} onLogout={onLogout} />
          <div className="p-4 md:p-6 w-full max-w-7xl mx-auto space-y-5 md:space-y-6 mt-2">
            <div className="flex gap-4 md:gap-6 border-b border-slate-200 overflow-x-auto hide-scroll">
              <button onClick={()=>setTab('active')} className={`pb-3 text-xs md:text-sm font-extrabold uppercase tracking-wider transition-all border-b-2 whitespace-nowrap ${tab==='active' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-400'}`}>My Patients ({userDevices.length})</button>
              <button onClick={()=>setTab('history')} className={`pb-3 text-xs md:text-sm font-extrabold uppercase tracking-wider transition-all border-b-2 whitespace-nowrap ${tab==='history' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-400'}`}>History</button>
            </div>

            {tab === 'active' && (
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5">
                {userDevices.slice(0, visibleCounts.active).map((d, i) => <StatusCard key={d.deviceId || `${d.room || 'room'}-${d.bed || 'bed'}-${d.startTime || 'time'}-${i}`} data={d} onComplete={handleComplete} onShare={openShare} currentUserUid={user.uid} />)}
                {userDevices.length === 0 && (
                  <div className="col-span-full py-20 text-center border-2 border-dashed border-slate-300 rounded-[2rem] bg-white/50 text-slate-400">
                    <div className="w-14 h-14 md:w-16 md:h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-bed text-xl md:text-2xl text-slate-300"></i></div>
                    <p className="font-bold text-base md:text-lg text-slate-500">No active infusions</p>
                    <p className="text-xs md:text-sm mt-1">Tap the + button to assign a device.</p>
                  </div>
                )}
                {userDevices.length > visibleCounts.active && <div className="col-span-full flex justify-center"><button onClick={() => setVisibleCounts(prev => ({ ...prev, active: prev.active + 24 }))} className="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-bold">Load more patients</button></div>}
              </div>
            )}

            {tab === 'history' && (
              <div>
                <div className="bg-white p-2.5 rounded-2xl shadow-sm border border-slate-200 flex items-center mb-4">
                  <i className="fas fa-search text-slate-400 ml-3"></i>
                  <input type="text" placeholder="Search history by patient, room, bed, device or staff..." className="w-full p-2 outline-none text-sm text-slate-700 ml-2 font-medium bg-transparent" value={historySearch} onChange={(e) => setHistorySearch(e.target.value)} />
                </div>
                <FilterTabs current={filterPeriod} onChange={setFilterPeriod} resultCount={filteredHistory.length} />
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 opacity-80">
                  {filteredHistory.slice(0, visibleCounts.history).map((d,i) => <StatusCard key={d.historyId || `${d.deviceId || 'hist'}-${d.completedAt || d.startTime || i}-${i}`} data={d} isHistory={true} />)}
                  {filteredHistory.length === 0 && <p className="col-span-full text-center text-slate-400 py-10 text-sm">No records found for this period.</p>}
                  {filteredHistory.length > visibleCounts.history && <div className="col-span-full flex justify-center"><button onClick={() => setVisibleCounts(prev => ({ ...prev, history: prev.history + 24 }))} className="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-bold">Load more history</button></div>}
                </div>
              </div>
            )}
          </div>

          <button onClick={()=>setShowAdd(true)} className="fixed bottom-6 right-6 md:bottom-8 md:right-8 w-14 h-14 md:w-16 md:h-16 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-500/40 flex items-center justify-center text-xl md:text-2xl active:-translate-y-1 active:scale-95 transition-all z-40 border-none outline-none">
            <i className="fas fa-plus"></i>
          </button>

          <PatientFormModal isOpen={showAdd} onClose={()=>setShowAdd(false)} hospitalId={hid} user={{ uid: user.uid, role: 'nurse', name: nurseName || user.email.split('@')[0] }} onSuccess={() => { setToast({type: 'success', msg: 'Infusion Started'}); setTimeout(()=>setToast(null), 2000); }} />

          <ShareDeviceModal isOpen={!!shareTarget} onClose={()=>setShareTarget(null)} hospitalId={hid} device={shareTarget} nurses={nurses} currentUser={{ uid: user.uid, name: nurseName || user.email.split('@')[0], email: user.email }} onSuccess={() => { setToast({type: 'success', msg: 'Handover request sent'}); setTimeout(()=>setToast(null), 2000); }} />
          <HandoverRequestModal request={handoverRequest} nurseName={nurseName || user.email.split('@')[0]} onAccept={acceptHandover} onReject={rejectHandover} />
          <DischargeConfirmModal
            open={!!pendingDischarge}
            device={pendingDischarge}
            onCancel={() => setPendingDischarge(null)}
            onConfirm={confirmPendingDischarge}
            loading={pendingDischargeLoading}
            title="Discharge patient"
          />
        </div>
      );
    };

    const SuperDashboard = ({ onLogout }) => {
      const [hospitals, setHospitals] = useState({});
      const [viewId, setViewId] = useState(null);
      const [showAddHospital, setShowAddHospital] = useState(false);

      useEffect(() => {
        const ref = db.ref('hospitals');
        const handler = snap => setHospitals(snap.val() || {});
        ref.on('value', handler);
        return () => ref.off('value', handler);
      }, []);

      const stats = useMemo(() => {
        let active = 0, totalInventory = 0;
        Object.values(hospitals).forEach(h => {
          if (h.active_devices) active += Object.keys(h.active_devices).length;
          if (h.registered_devices) totalInventory += Object.keys(h.registered_devices).length;
        });
        return { active, devices: totalInventory };
      }, [hospitals]);

      const handleDeleteHospital = async (hid) => {
        const hospitalName = hospitals[hid]?.name || 'this hospital';
        if (!(await window.__sg_confirm(`Delete ${hospitalName} completely? This will remove all staff, devices, active records, and history.`, 'Delete Hospital'))) return;
        try { await db.ref(`hospitals/${hid}`).remove(); if (viewId === hid) setViewId(null); } catch (e) { window.__sg_notify(e.message); }
      };

      if (viewId) {
        return (
          <div className="min-h-screen pb-10">
            <header className="bg-slate-900 text-white px-4 py-3 md:px-6 md:py-4 flex justify-between items-center shadow-lg sticky top-0 z-50 backdrop-blur-md bg-slate-900/90 pt-safe gap-3">
              <button onClick={()=>setViewId(null)} className="flex items-center gap-2 md:gap-3 active:text-blue-400 transition-colors bg-slate-800 px-3 py-2 md:px-4 md:py-2.5 rounded-xl font-bold text-xs md:text-sm border-none outline-none"><i className="fas fa-arrow-left"></i> <span>Network</span></button>
              <div className="font-extrabold tracking-tight text-sm md:text-base truncate pl-2 flex-1">{hospitals[viewId] ? hospitals[viewId].name : ''}</div>
              <button onClick={() => handleDeleteHospital(viewId)} className="bg-red-600 active:bg-red-700 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl font-bold text-xs md:text-sm border-none outline-none shrink-0">Delete Hospital</button>
            </header>
            <div className="py-4 md:py-8"><HospitalDashboard hospitalId={viewId} userRole="admin" isSuperView={true} /></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-10 fade-in">
          <AppHeader title="Super Admin" subtitle="Global Network Control" onLogout={onLogout} />
          <div className="p-4 md:p-8 w-full mx-auto max-w-7xl space-y-6 md:space-y-8">
            <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 rounded-[1.5rem] md:rounded-[2rem] p-6 md:p-10 text-white shadow-2xl relative overflow-hidden border border-slate-700">
              <div className="absolute right-0 top-0 w-48 h-48 md:w-64 md:h-64 bg-blue-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
              <div className="relative z-10 grid grid-cols-2 md:grid-cols-4 gap-5 md:gap-8">
                <div><div className="text-[9px] md:text-[10px] font-extrabold text-blue-300 uppercase tracking-widest mb-1.5 md:mb-2 flex items-center gap-2"><i className="fas fa-microchip"></i> Reg. Devices</div><div className="text-3xl md:text-5xl font-black text-white">{stats.devices}</div></div>
                <div><div className="text-[9px] md:text-[10px] font-extrabold text-emerald-300 uppercase tracking-widest mb-1.5 md:mb-2 flex items-center gap-2"><i className="fas fa-user-nurse"></i> Staff</div><div className="text-3xl md:text-5xl font-black text-emerald-400">{stats.nurses}</div></div>
                <div><div className="text-[9px] md:text-[10px] font-extrabold text-purple-300 uppercase tracking-widest mb-1.5 md:mb-2 flex items-center gap-2"><i className="fas fa-hospital"></i> Facilities</div><div className="text-3xl md:text-5xl font-black text-white">{Object.keys(hospitals).length}</div></div>
                <div><div className="text-[9px] md:text-[10px] font-extrabold text-rose-300 uppercase tracking-widest mb-1.5 md:mb-2 flex items-center gap-2"><i className="fas fa-procedures"></i> Live</div><div className="text-3xl md:text-5xl font-black text-white">{stats.active}</div></div>
              </div>
            </div>

            <div className="flex justify-between items-center gap-3 flex-wrap">
              <h3 className="font-extrabold text-slate-800 text-lg md:text-xl tracking-tight">Partner Hospitals</h3>
              <button onClick={() => setShowAddHospital(true)} className="bg-indigo-600 active:bg-indigo-700 text-white px-5 py-3 rounded-xl font-bold text-sm shadow-md transition-all flex items-center justify-center gap-2 border-none outline-none"><i className="fas fa-hospital-user"></i> Add Hospital</button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
              {Object.entries(hospitals).map(([hid, h]) => {
                const inventoryCount = h.registered_devices ? Object.keys(h.registered_devices).length : 0;
                const activeCount = h.active_devices ? Object.keys(h.active_devices).length : 0;
                const staffCount = h.nurses ? Object.keys(h.nurses).length : 0;
                const addedDate = h.createdAt || h.addedAt || null;
                return (
                  <div key={hid} onClick={()=>setViewId(hid)} className="bg-white p-5 md:p-6 rounded-[1.5rem] shadow-sm border border-slate-200 cursor-pointer active:shadow-md active:bg-slate-50 transition-all group relative overflow-hidden">
                    <button onClick={(e) => { e.stopPropagation(); handleDeleteHospital(hid); }} className="absolute top-4 right-4 z-20 bg-red-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider border-none outline-none">Delete</button>
                    <div className="absolute top-0 right-0 w-20 h-20 md:w-24 md:h-24 bg-blue-50 rounded-bl-full -z-0"></div>
                    <div className="relative z-10">
                      <div className="w-12 h-12 md:w-14 md:h-14 bg-white shadow-md border border-slate-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl md:text-2xl mb-4"><i className="fas fa-hospital"></i></div>
                      <h4 className="font-extrabold text-lg md:text-xl text-slate-800 mb-1 tracking-tight truncate">{h.name}</h4>
                      <div className="text-[10px] md:text-xs font-bold text-slate-400 mb-2 flex items-center gap-1.5"><i className="fas fa-map-marker-alt"></i> {h.location}</div>
                      <div className="text-[10px] md:text-xs font-bold text-slate-500 mb-4 flex items-center gap-1.5"><i className="fas fa-calendar-alt"></i> Started: {addedDate ? new Date(addedDate).toLocaleDateString('en-IN') : 'Not set'}</div>
                      <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                        <div className="text-center"><div className="text-[8px] md:text-[10px] font-bold text-slate-400 uppercase tracking-wider">Inventory</div><div className="font-black text-sm md:text-base text-slate-700">{inventoryCount}</div></div>
                        <div className="w-px h-5 md:h-6 bg-slate-200"></div>
                        <div className="text-center"><div className="text-[8px] md:text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active</div><div className="font-black text-sm md:text-base text-blue-600">{activeCount}</div></div>
                        <div className="w-px h-5 md:h-6 bg-slate-200"></div>
                        <div className="text-center"><div className="text-[8px] md:text-[10px] font-bold text-slate-400 uppercase tracking-wider">Staff</div><div className="font-black text-sm md:text-base text-slate-700">{staffCount}</div></div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <AddHospitalModal isOpen={showAddHospital} onClose={() => setShowAddHospital(false)} onSuccess={() => { setShowAddHospital(false); }} />
        </div>
      );
    };

    const LoginScreen = () => {
      const [email, setEmail] = useState('');
      const [pass, setPass] = useState('');
      const [loading, setLoading] = useState(false);
      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try { await auth.signInWithEmailAndPassword(email, pass); }
        catch (err) { window.__sg_notify(err.message); setLoading(false); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4 md:p-6 relative overflow-hidden fade-in">
          <div className="absolute top-[-10%] left-[-10%] w-[80%] h-[80%] bg-blue-400/20 rounded-full blur-[80px] md:blur-[100px] pointer-events-none"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-[70%] h-[70%] bg-indigo-400/20 rounded-full blur-[80px] md:blur-[100px] pointer-events-none"></div>
          <div className="glass-panel w-full max-w-sm md:max-w-md p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl relative z-10 mx-auto border-none outline-none">
            <div className="text-center mb-8 md:mb-10">
              <div className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl md:rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-blue-500/30 mb-5 md:mb-6 transform -rotate-3 transition-all"><i className="fas fa-heartbeat text-3xl md:text-4xl text-white"></i></div>
              <h1 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">SalineGuard</h1>
              <p className="text-[10px] md:text-xs font-bold tracking-widest text-blue-600 uppercase mt-1.5 md:mt-2">Enterprise Access</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4 md:space-y-5">
              <div className="space-y-1.5"><label className="text-[9px] md:text-[10px] uppercase tracking-widest font-extrabold text-slate-500 ml-1.5 md:ml-2">Secure ID</label><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="username@hospital.branch" className="w-full p-3.5 md:p-4 bg-slate-100 rounded-xl md:rounded-2xl border-0 focus:bg-slate-200 outline-none transition-all font-medium text-sm md:text-base text-slate-800" required /></div>
              <div className="space-y-1.5"><label className="text-[9px] md:text-[10px] uppercase tracking-widest font-extrabold text-slate-500 ml-1.5 md:ml-2">Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" className="w-full p-3.5 md:p-4 bg-slate-100 rounded-xl md:rounded-2xl border-0 focus:bg-slate-200 outline-none transition-all font-medium text-sm md:text-base text-slate-800" required /></div>
              <button disabled={loading} className="w-full bg-slate-900 active:bg-black text-white py-3.5 md:py-4 mt-2 rounded-xl md:rounded-2xl font-extrabold shadow-xl shadow-slate-900/20 active:scale-[0.98] transition-all flex justify-center items-center text-sm md:text-base border-none outline-none">{loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Authenticate'}</button>
            </form>
          </div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const info = getHospitalInfo(user.email || '');
        if (!info.id || info.id === 'unknown') return;
        if (info.id === 'super_admin') return;

        const nurseRef = db.ref(`hospitals/${info.id}/nurses/${user.uid}`);
        const handler = snap => {
          if (!snap.exists()) { auth.signOut(); return; }
          const val = snap.val() || {};
          if (isNurseDisabled(val)) { window.__sg_notify('Your account has been disabled by admin.'); auth.signOut(); }
        };
        nurseRef.on('value', handler);
        return () => nurseRef.off('value', handler);
      }, [user]);

      if (loading) return <LoadingScreen />;
      if (!user) return <LoginScreen />;
      const info = getHospitalInfo(user.email || '');
      if (info.id === 'super_admin') return <SuperDashboard onLogout={()=>auth.signOut()} />;
      if ((user.email || '').startsWith('admin@')) {
        return <div className="min-h-screen pb-10"><AppHeader title={info.name} subtitle="Hospital Administration" onLogout={()=>auth.signOut()} /><div className="py-4 md:py-8"><HospitalDashboard hospitalId={info.id} userRole="admin" /></div></div>;
      }
      return <NurseApp user={user} onLogout={()=>auth.signOut()} />;
    };

    const mountApp = () => {
      const rootElement = document.getElementById('root');
      if (rootElement) ReactDOM.createRoot(rootElement).render(<App />);
      else console.error('Root element not found');
    };

    if (document.readyState === 'complete') mountApp();
    else window.addEventListener('load', mountApp, { once: true });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>SalineGuard Pro | Enterprise</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    :root, html, body, #root { width: 100% !important; min-height: 100dvh !important; margin: 0 !important; padding: 0 !important; box-sizing: border-box !important; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-family: 'Inter', sans-serif; }
    :root, html, body { --bg-color: #f1f5f9; background-color: var(--bg-color) !important; background-image: radial-gradient(#e2e8f0 1px, transparent 1px) !important; background-size: 20px 20px !important; background-attachment: fixed !important; background-position: 0 0 !important; overflow-x: hidden !important; overflow-y: auto !important; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom); height: 100%; }
    html, body, #root { border: none !important; box-shadow: none !important; outline: none !important; background-clip: padding-box !important; -webkit-tap-highlight-color: transparent; }
    *, *::before, *::after { box-sizing: border-box; }
    body { overflow-y: auto !important; user-select: text; -webkit-user-select: text; -webkit-touch-callout: text; }
    input, textarea, select, button { font-family: inherit; }
    input, textarea, select { border: none !important; outline: none !important; box-shadow: none !important; background-clip: padding-box !important; appearance: none !important; -webkit-appearance: none !important; -moz-appearance: none !important; }
    input:focus, textarea:focus { outline: none !important; border: none !important; box-shadow: none !important; }
    ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
    .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .pt-safe { padding-top: env(safe-area-inset-top, 12px); }
    .modal-open { overflow: hidden !important; }
    .fade-in { animation: fadeIn 0.22s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .critical-alert { animation: pulse-border 2s infinite; }
    @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); border-color: #ef4444; } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); border-color: #ef4444; } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); border-color: #ef4444; } }
    .saline-loader { position: relative; width: 60px; height: 100px; margin: 0 auto; }
    .bottle { width: 40px; height: 60px; border: 3px solid #3b82f6; border-radius: 0 0 20px 20px; margin: 0 auto; position: relative; overflow: hidden; background: rgba(255,255,255,0.8); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); }
    .bottle::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #60a5fa; animation: drain 2s infinite linear; }
    .drip { width: 8px; height: 12px; background: #3b82f6; border-radius: 50%; margin: 5px auto 0; animation: drop 1s infinite cubic-bezier(0.5, 0, 1, 0.5); }
    @keyframes drain { 0% { top: 0; } 100% { top: 100%; } }
    @keyframes drop { 0% { transform: translateY(0) scaleY(1); opacity: 1; } 100% { transform: translateY(40px) scaleY(0); opacity: 0; } }
    .min-h-screen { min-height: 100dvh !important; }
    .fixed.bottom-6.right-6, .fixed.bottom-8.right-8, .fixed.bottom-6.right-4, .fixed.bottom-8.right-4 { bottom: calc(1.5rem + env(safe-area-inset-bottom)) !important; right: calc(1.5rem + env(safe-area-inset-right, 0px)) !important; }
    @media (min-width: 768px) { .fixed.bottom-8.right-8 { bottom: calc(2rem + env(safe-area-inset-bottom)) !important; right: calc(2rem + env(safe-area-inset-right, 0px)) !important; } }
  </style>

  <script>
    window.onerror = function(message, source, lineno) {
      try {
        const old = document.getElementById('__sg_error_banner');
        if (old) old.remove();
        const errDiv = document.createElement('div');
        errDiv.id = '__sg_error_banner';
        errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#ef4444;color:white;z-index:999999;padding:14px 18px;font-family:monospace;font-size:13px;word-wrap:break-word;box-shadow:0 6px 18px rgba(0,0,0,0.2)';
        errDiv.innerHTML = `<strong>WebView Error:</strong> ${message} <span style="opacity:.9;margin-left:10px;font-weight:600">Line: ${lineno}</span> <button onclick="document.getElementById('__sg_error_banner')?.remove()" style="float:right;background:transparent;border:0;color:white;font-weight:700;cursor:pointer">✕</button>`;
        document.body.appendChild(errDiv);
      } catch(e) {}
      return false;
    };
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const AMC_PER_DEVICE = 1500;
    const AMC_CYCLE_MS = 365 * 24 * 60 * 60 * 1000;
    const INFUSION_DURATION_MS = 6 * 60 * 60 * 1000;
    const DEFAULT_TOTAL_ML = 1000;
    const ML_STEP = 100;
    const ALERT_LEVELS = [75, 50, 25, 10, 5, 2];
    const DEFAULT_PERCENT_ALERTS = ALERT_LEVELS.reduce((acc, n) => { acc[n] = true; return acc; }, {});
    const DEVICE_STALE_MS = 15000;
    const ENABLE_ADMIN_NOTIFICATIONS = false;

    const firebaseConfig = {
      apiKey: "AIzaSyCYkB2xXeZDT7OA8UyCwDt0ipc3oLXDzkw",
      authDomain: "salinemonitor-7534e.firebaseapp.com",
      databaseURL: "https://salinemonitor-7534e-default-rtdb.firebaseio.com/",
      projectId: "salinemonitor-7534e",
      storageBucket: "salinemonitor-7534e.firebasestorage.app",
      messagingSenderId: "973031594138",
      appId: "1:973031594138:web:b8b98226c33ef744bfa723"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const { useState, useEffect, useMemo, useRef } = React;
    const { createPortal } = ReactDOM;
    let secondaryAuthInstance = null;

    const getSecondaryAuth = () => {
      if (secondaryAuthInstance) return secondaryAuthInstance;
      const existingApp = firebase.apps.find(app => app.name === 'Secondary');
      const secondaryApp = existingApp || firebase.initializeApp(firebaseConfig, 'Secondary');
      secondaryAuthInstance = secondaryApp.auth();
      return secondaryAuthInstance;
    };

    const copyText = async (text) => {
      if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text).then(() => true);
      const temp = document.createElement('textarea');
      temp.value = text;
      temp.setAttribute('readonly', '');
      temp.style.position = 'fixed';
      temp.style.opacity = '0';
      document.body.appendChild(temp);
      temp.select();
      const copied = document.execCommand('copy');
      document.body.removeChild(temp);
      return copied;
    };

    const formatMoney = (amt) => "₹" + Number(amt || 0).toLocaleString('en-IN');
    const formatMl = (ml) => `${Math.max(0, Math.round(Number(ml || 0)))}ml`;
    const slugify = (value = '') => String(value).toLowerCase().trim().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    const humanize = (value = '') => String(value).toLowerCase().split(/[_\s.-]+/).filter(Boolean).map(v => v.charAt(0).toUpperCase() + v.slice(1)).join(' ');
    const normalizeName = (value = '') => String(value).trim().toLowerCase().replace(/\s+/g, ' ');
    const safeNum = (v, fallback = 0) => {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    };

    const getHospitalInfo = (email) => {
      if (!email) return { id: 'unknown', name: 'Unknown', loc: '', domain: '' };
      if (email === 'admin@gmail.com') return { id: 'super_admin', name: 'Super Admin', loc: 'Global', domain: '' };
      const parts = email.split('@');
      if (parts.length < 2) return { id: 'unknown', name: 'Unknown', loc: '', domain: '' };
      const domainFull = parts[1];
      const domainParts = domainFull.split('.');
      if (domainParts.length >= 2) {
        const hName = domainParts[0];
        const hLoc = domainParts[1];
        return { id: `${hName}_${hLoc}`.toLowerCase(), name: humanize(hName) + ' Hospital', loc: humanize(hLoc), domain: `${hName}.${hLoc}` };
      }
      return { id: 'unknown', name: 'Unknown', loc: '', domain: '' };
    };

    const sortHistoryDesc = (histList = []) => [...histList].sort((a, b) => (b?.completedAt || b?.startTime || 0) - (a?.completedAt || a?.startTime || 0));
    const sortActiveDevices = (devices = []) => [...devices].sort((a, b) => {
      const ap = safeNum(a?.perc, 100), bp = safeNum(b?.perc, 100);
      const am = getDeviceMlRemaining(a), bm = getDeviceMlRemaining(b);
      const at = a?.startTime || 0, bt = b?.startTime || 0;
      return ap - bp || am - bm || bt - at;
    });

    const filterHistoryByTime = (histList, period) => {
      const sorted = sortHistoryDesc(histList);
      if (period === 'max') return sorted;
      const now = Date.now();
      const todayStart = new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate()).getTime();
      return sorted.filter(h => {
        const itemTime = h.completedAt || h.startTime || 0;
        if (period === 'day') return itemTime >= todayStart;
        if (period === 'week') return (now - itemTime) <= (7 * 86400000);
        if (period === 'month') return (now - itemTime) <= (30 * 86400000);
        return true;
      });
    };

    const getRemainingMs = (device) => {
      if (!device?.startTime) return INFUSION_DURATION_MS;
      return Math.max(0, INFUSION_DURATION_MS - (Date.now() - device.startTime));
    };

    const formatDuration = (ms) => {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    };

    const getDeviceMlRemaining = (device) => {
      if (!device) return DEFAULT_TOTAL_ML;
      if (device.mlLeft !== undefined && device.mlLeft !== null && device.mlLeft !== '') return Math.max(0, safeNum(device.mlLeft, DEFAULT_TOTAL_ML));
      const totalMl = safeNum(device.totalMl, DEFAULT_TOTAL_ML);
      const perc = safeNum(device.perc, 100);
      return Math.max(0, Math.round((perc / 100) * totalMl));
    };

    const getDevicePercent = (device) => {
      if (!device) return 100;
      if (device.perc !== undefined && device.perc !== null && device.perc !== '') return Math.max(0, Math.min(100, safeNum(device.perc, 100)));
      const totalMl = safeNum(device.totalMl, DEFAULT_TOTAL_ML);
      const ml = getDeviceMlRemaining(device);
      return totalMl > 0 ? Math.max(0, Math.min(100, Math.round((ml / totalMl) * 100))) : 0;
    };

    const generateMlThresholds = (totalMl = DEFAULT_TOTAL_ML) => {
      const t = Math.max(100, Math.round(safeNum(totalMl, DEFAULT_TOTAL_ML)));
      const thresholds = [];
      for (let ml = t - ML_STEP; ml >= ML_STEP; ml -= ML_STEP) thresholds.push(ml);
      thresholds.push(0);
      return thresholds;
    };

    const getDeviceLastSeenAt = (device) => {
      if (!device) return 0;
      if (device.clientReceivedAt > 0) return Number(device.clientReceivedAt);
      return Number(device.lastUpdate || device.updatedAt || device.startTime || 0);
    };

    const isDeviceOnlineNow = (device, nowTs = Date.now()) => {
      if (!device) return false;
      if (device.deviceOnline === false) return false;
      const lastSeen = getDeviceLastSeenAt(device);
      if (lastSeen <= 0) return false;
      return (nowTs - lastSeen) <= (DEVICE_STALE_MS + 20000);
    };

    const stampReceivedAt = (data = {}) => {
      if (!data) return {};
      const now = Date.now();
      const stamped = {};
      Object.keys(data).forEach(key => {
        const deviceNode = data[key];
        if (deviceNode && typeof deviceNode === 'object') stamped[key] = { ...deviceNode, clientReceivedAt: now };
        else stamped[key] = deviceNode;
      });
      return stamped;
    };

    const OFFLINE_ALERT_MS = DEVICE_STALE_MS;
    const NO_FLOW_ALERT_MS = 75 * 1000;
    const RAPID_DROP_PERCENT = 20;

    const triggerPatientAlert = ({ title, body }) => {
      const icon = "https://cdn-icons-png.flaticon.com/512/3004/3004451.png";
      try {
        if ("Notification" in window && window.Notification && Notification.permission === 'granted') {
          new Notification(title, { body, icon });
        }
      } catch (e) {}
    };

    const claimAndArchiveDevice = async (hospitalId, deviceId, completionType = 'manual', extraFields = {}) => {
      const activeRef = db.ref(`hospitals/${hospitalId}/active_devices/${deviceId}`);
      const historyRef = db.ref(`hospitals/${hospitalId}/history`);
      const tx = await activeRef.transaction((current) => {
        if (!current) return;
        if (current.completionLock || current.completedAt) return;
        return { ...current, completionLock: { type: completionType, claimedAt: Date.now() } };
      });
      if (!tx.committed || !tx.snapshot.exists()) return false;
      const data = tx.snapshot.val();
      if (!data || !data.completionLock) return false;
      const { completionLock, ...payloadBase } = data;
      const historyPayload = { ...payloadBase, ...extraFields, completedAt: Date.now(), completedVia: completionType, autoDischarged: completionType === 'auto', historyCreatedAt: Date.now() };
      try {
        const newHistoryRef = historyRef.push();
        historyPayload.historyId = newHistoryRef.key;
        await newHistoryRef.set(historyPayload);
        await activeRef.remove();
        return true;
      } catch (e) {
        console.error('Archive move failed:', e);
        return false;
      }
    };

    const isNurseDisabled = (nurse) => !!(nurse?.disabled || nurse?.status === 'disabled');

    const LoadingScreen = () => (
      <div className="fixed inset-0 bg-slate-50 z-[9999] flex flex-col items-center justify-center">
        <div className="saline-loader">
          <div className="bottle"></div>
          <div className="drip"></div>
        </div>
        <h2 className="text-xl font-extrabold text-slate-800 tracking-widest mt-6">SALINE GUARD</h2>
        <p className="text-xs text-blue-500 mt-2 font-mono font-medium">Initializing System...</p>
      </div>
    );

    const Toast = ({ msg, type }) => (
      <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 fade-in w-11/12 max-w-sm justify-center ${type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white border-0'}`}>
        <i className={`fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'} text-emerald-400`}></i>
        <span className="font-bold text-sm">{msg}</span>
      </div>
    );

    const Clock = () => {
      const [t, setT] = useState(new Date());
      useEffect(() => {
        const id = setInterval(() => setT(new Date()), 1000);
        return () => clearInterval(id);
      }, []);
      return (
        <div className="text-right">
          <div className="font-mono font-bold text-base md:text-lg leading-none text-white">
            {t.toLocaleTimeString('en-IN', { hour12: true, hour:'2-digit', minute:'2-digit', second:'2-digit' }).toUpperCase()}
          </div>
          <div className="text-[9px] md:text-[10px] uppercase font-bold text-slate-400 mt-1 tracking-wider">
            {t.toLocaleDateString('en-IN', { weekday: 'short', day:'numeric', month:'short' }).toUpperCase()}
          </div>
        </div>
      );
    };

    const PortalModal = ({ open, children }) => open ? createPortal(children, document.body) : null;

    const AppHeader = ({ title, subtitle, onLogout }) => {
      const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
      return (
        <>
          <header className="bg-slate-900 px-4 py-3 md:px-6 flex justify-between items-center shadow-lg sticky top-0 z-40 border-b border-slate-800 backdrop-blur-md bg-slate-900/90 pt-safe">
            <div className="flex items-center gap-3 md:gap-4 min-w-0">
              <div className="w-10 h-10 md:w-11 md:h-11 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40 shrink-0">
                <i className="fas fa-heartbeat text-lg md:text-xl"></i>
              </div>
              <div className="min-w-0 pr-2">
                <h2 className="font-extrabold text-white text-sm md:text-lg leading-tight truncate">{title}</h2>
                <p className="text-[9px] md:text-xs text-blue-400 font-bold uppercase tracking-widest mt-0.5 truncate">{subtitle}</p>
              </div>
            </div>
            <div className="flex items-center gap-3 md:gap-6 shrink-0">
              <Clock />
              <div className="hidden md:block w-px h-8 bg-slate-700/50"></div>
              <button onClick={() => setShowLogoutConfirm(true)} className="w-9 h-9 md:w-10 md:h-10 rounded-full bg-slate-800 text-slate-400 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center shrink-0" aria-label="Logout">
                <i className="fas fa-power-off text-sm"></i>
              </button>
            </div>
          </header>
          <PortalModal open={showLogoutConfirm}>
            <div className="fixed inset-0 z-[999999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
              <div className="w-full max-w-sm rounded-3xl bg-white shadow-2xl overflow-hidden">
                <div className="p-6 md:p-7 border-b border-slate-100">
                  <div className="w-14 h-14 rounded-2xl bg-red-50 text-red-600 flex items-center justify-center mb-4"><i className="fas fa-right-from-bracket text-2xl"></i></div>
                  <h3 className="text-xl md:text-2xl font-extrabold text-slate-800">Do you want to log out?</h3>
                  <p className="text-sm text-slate-500 mt-2 leading-6">You will be signed out and taken back to the login screen.</p>
                </div>
                <div className="p-4 md:p-5 flex gap-3">
                  <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-3 rounded-xl bg-slate-100 text-slate-700 font-bold text-sm active:bg-slate-200 transition-colors">Cancel</button>
                  <button onClick={() => { setShowLogoutConfirm(false); onLogout && onLogout(); }} className="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold text-sm active:bg-red-700 transition-colors">Log out</button>
                </div>
              </div>
            </div>
          </PortalModal>
        </>
      );
    };

    const FilterTabs = ({ current, onChange, resultCount }) => (
      <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-5">
        <div className="flex gap-2 overflow-x-auto pb-1 hide-scroll">
          {['day', 'week', 'month', 'max'].map(p => (
            <button key={p} onClick={() => onChange(p)} className={`px-4 py-1.5 text-xs font-bold rounded-lg uppercase tracking-wider transition-colors border shrink-0 ${current === p ? 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-500/20' : 'bg-white text-slate-500 border-slate-200 active:bg-slate-50'}`}>
              {p}
            </button>
          ))}
        </div>
        {resultCount !== undefined && <div className="text-xs font-bold text-slate-400 shrink-0"><i className="fas fa-poll-h mr-1"></i> {resultCount} records</div>}
      </div>
    );

    const StatusCard = ({ data, onComplete, onShare, isHistory = false, currentUserUid = null }) => {
      const [nowTick, setNowTick] = useState(Date.now());
      useEffect(() => {
        const id = setInterval(() => setNowTick(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);

      const perc = getDevicePercent(data);
      const totalMl = safeNum(data?.totalMl, DEFAULT_TOTAL_ML);
      const mlRemaining = getDeviceMlRemaining(data);
      const mlInfused = Math.max(0, totalMl - mlRemaining);
      const isOnline = !isHistory && isDeviceOnlineNow(data);
      const isCrit = perc <= 10 && !isHistory;
      const finishTime = (() => {
        const expectedMs = Number(data?.estimatedCompletionAt);
        if (expectedMs && expectedMs > 0) return new Date(expectedMs);
        const mins = data?.minsLeft !== undefined ? Number(data.minsLeft) : null;
        const secs = data?.secsLeft !== undefined ? Number(data.secsLeft) : null;
        if (mins !== null && mins < 999) return new Date(nowTick + (mins * 60000) + ((secs || 0) * 1000));
        return null;
      })();
      const finishLabel = finishTime ? finishTime.toLocaleTimeString('en-IN', { hour12: true, hour: '2-digit', minute: '2-digit' }) : '--';
      const displayName = data?.patientName || `Room ${data?.room || '-'} - Bed ${data?.bed || '-'}`;
      const timeString = isHistory ? 'Done' : `${formatDuration(getRemainingMs(data))} left`;
      const canManage = !isHistory && (!currentUserUid || data?.nurseId === currentUserUid);

      return (
        <div className={`relative bg-white rounded-2xl p-4 md:p-5 border transition-all duration-300 shadow-sm flex flex-col justify-between ${isCrit || data?.salineRemoved ? 'border-red-400 critical-alert' : (isOnline ? 'border-slate-200' : 'border-amber-400')}`}>
          <div>
            <div className="flex justify-between items-start mb-4 gap-2">
              <div className="pr-2 min-w-0 flex-1">
                <h3 className="font-bold text-slate-800 text-base md:text-lg truncate" title={displayName}>{displayName}</h3>
                <div className="flex items-center gap-2 mt-1.5 text-xs font-bold text-slate-600 flex-wrap">
                  <span className="bg-blue-50 px-2 py-1 rounded-md border border-blue-100 shrink-0"><i className="fas fa-door-open mr-1 text-blue-500"></i> R: {data?.room}</span>
                  <span className="bg-indigo-50 px-2 py-1 rounded-md border border-indigo-100 shrink-0"><i className="fas fa-bed mr-1 text-indigo-500"></i> B: {data?.bed}</span>
                  {!isHistory && (
                    <span className={`px-2 py-1 rounded-md border shrink-0 ${isOnline ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-amber-50 text-amber-700 border-amber-100'}`}>
                      <i className={`fas ${isOnline ? 'fa-wifi' : 'fa-wifi-slash'} mr-1 ${isOnline ? 'text-emerald-500' : 'text-amber-500'}`}></i>
                      {isOnline ? 'Online' : 'Offline'}
                    </span>
                  )}
                  {data?.handoverPendingToName && !isHistory && (
                    <span className="px-2 py-1 rounded-md border shrink-0 bg-purple-50 text-purple-700 border-purple-100">
                      <i className="fas fa-share mr-1"></i> To {data.handoverPendingToName}
                    </span>
                  )}
                </div>
              </div>
              <div className="bg-slate-50 border border-slate-200 text-slate-800 rounded-lg px-2.5 py-1.5 text-center shadow-sm shrink-0">
                <div className="text-[8px] uppercase font-bold text-slate-400 mb-0.5 tracking-wider">Device ID</div>
                <div className="font-mono font-bold text-xs md:text-sm leading-none text-slate-700">{data?.deviceId}</div>
              </div>
            </div>

            <div className="mb-4">
              <div className="flex justify-between text-xs font-bold mb-1.5 gap-2">
                <span className={perc <= 10 && !isHistory ? 'text-red-600 animate-pulse' : 'text-blue-600'}>{perc}% Infused</span>
                <span className="text-slate-400 font-mono tracking-tight truncate">{isHistory ? (data?.autoDischarged ? 'Auto Discharged' : 'Completed') : timeString}</span>
              </div>
              <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner">
                <div className={`h-full rounded-full transition-all duration-1000 ${isHistory ? 'bg-emerald-500' : (perc<=10 || data?.salineRemoved ? 'bg-red-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500')}`} style={{ width: `${Math.max(0, Math.min(100, perc))}%` }}></div>
              </div>
              <div className="mt-3 space-y-1.5">
                {!isHistory && data?.salineRemoved && (
                  <div className="bg-red-100 border border-red-200 text-red-700 text-[10px] uppercase tracking-wider font-bold px-2 py-1.5 rounded-md flex items-center justify-center animate-pulse shadow-sm">
                    <i className="fas fa-exclamation-triangle mr-1.5"></i> Saline Removed!
                  </div>
                )}
                {!isHistory && data?.blockageSuspected && !data?.salineRemoved && (
                  <div className="bg-amber-100 border border-amber-200 text-amber-700 text-[10px] uppercase tracking-wider font-bold px-2 py-1.5 rounded-md flex items-center justify-center animate-pulse shadow-sm">
                    <i className="fas fa-ban mr-1.5"></i> Flow Blockage Detected!
                  </div>
                )}
                <div className="text-[10px] text-slate-500 font-medium flex flex-wrap gap-2">
                  <span className="font-bold text-slate-700">{formatMl(mlInfused)} / {formatMl(totalMl)} used</span>
                  <span>•</span>
                  <span className="font-bold text-slate-700">{formatMl(mlRemaining)} left</span>
                  {!isHistory && <><span>•</span><span>Expected completion at <span className="font-bold text-slate-700">{finishLabel}</span></span></>}
                </div>
              </div>
            </div>
          </div>

          <div className="flex justify-between items-center pt-3 border-t border-slate-100 mt-auto gap-3">
            <div className="text-[9px] md:text-[10px] text-slate-500 font-medium min-w-0">
              <div className="mb-1 text-slate-700 font-bold flex items-center truncate max-w-[160px]"><i className="fas fa-user-nurse mr-1.5 text-slate-400"></i><span className="truncate">{data?.nurseName || 'Unknown Staff'}</span></div>
              {isHistory ? (
                <span className={`px-2 py-0.5 rounded-md inline-block ${data?.autoDischarged ? 'text-amber-600 bg-amber-50' : 'text-emerald-600 bg-emerald-50'}`}>
                  <i className={`fas ${data?.autoDischarged ? 'fa-clock' : 'fa-check-circle'} mr-1`}></i>
                  {data?.autoDischarged ? 'Auto Discharged' : new Date(data?.completedAt || Date.now()).toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' })}
                </span>
              ) : (
                <div className="space-y-1">
                  <span className="text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md inline-block">Start: {new Date(data?.startTime || Date.now()).toLocaleString('en-IN', { timeStyle: 'short' })}</span>
                  {data?.handoverRequestedByName && data?.handoverPendingToName && <span className="text-purple-700 bg-purple-50 px-2 py-0.5 rounded-md inline-block">Transfer: {data.handoverRequestedByName} → {data.handoverPendingToName}</span>}
                </div>
              )}
            </div>
            {!isHistory && (
              <div className="flex gap-2 shrink-0">
                {canManage && onShare && (
                  <button onClick={() => onShare(data)} className="bg-indigo-600 active:bg-indigo-700 text-white text-[10px] md:text-xs font-bold px-3 py-2 rounded-lg shadow-md active:scale-95 transition-all flex items-center gap-1.5">
                    <i className="fas fa-share"></i> Share
                  </button>
                )}
                {canManage && onComplete && (
                  <button onClick={() => { if (onComplete) onComplete(data.deviceId); }} className="bg-slate-900 active:bg-emerald-600 text-white text-[10px] md:text-xs font-bold px-3 py-2 rounded-lg shadow-md active:scale-95 transition-all flex items-center gap-1.5">
                    <span>Discharge</span> <i className="fas fa-check text-slate-400"></i>
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    const AddDeviceModal = ({ isOpen, onClose, hospitalId, onSuccess }) => {
      const [deviceId, setDeviceId] = useState('');
      const [loading, setLoading] = useState(false);
      useEffect(() => { document.body.classList.toggle('modal-open', isOpen); return () => document.body.classList.remove('modal-open'); }, [isOpen]);

      const handleSubmit = async () => {
        const did = deviceId.trim().toUpperCase();
        if (!did) { alert('Please enter a valid Device ID.'); return; }
        setLoading(true);
        try {
          const snap = await db.ref(`hospitals/${hospitalId}/registered_devices/${did}`).once('value');
          if (snap.exists()) {
            alert(`Device ID ${did} is already registered to this hospital.`);
          } else {
            await db.ref(`hospitals/${hospitalId}/registered_devices/${did}`).set({ deviceId: did, addedAt: Date.now() });
            onSuccess();
            setDeviceId('');
            onClose();
          }
        } catch (e) { alert(e.message); }
        setLoading(false);
      };

      return (
        <PortalModal open={isOpen}>
          <div className="fixed inset-0 z-[999999] w-screen h-screen bg-black/80 backdrop-blur-md flex items-center justify-center p-4 m-0 fade-in">
            <div className="bg-white w-[92vw] max-w-sm rounded-3xl p-6 shadow-2xl relative border-0 outline-none mx-auto">
              <div className="flex justify-between items-center mb-6 gap-3">
                <div className="min-w-0">
                  <h3 className="font-extrabold text-slate-800 text-xl">Register Device</h3>
                  <p className="text-xs font-medium text-slate-400 mt-1">Add ESP ID to hospital inventory</p>
                </div>
                <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-100 text-slate-500 active:bg-slate-200 transition-colors flex items-center justify-center border-none"><i className="fas fa-times text-sm"></i></button>
              </div>
              <div className="space-y-4">
                <div className="relative">
                  <input value={deviceId} onChange={e => setDeviceId(e.target.value)} placeholder="e.g. ESP-1001" className="w-full p-4 bg-slate-100 focus:bg-slate-200 rounded-xl font-mono text-center text-xl font-bold tracking-widest uppercase transition-colors" autoFocus />
                  <div className="text-[10px] uppercase tracking-wider font-bold text-center text-slate-400 mt-2">Unique Device ID <span className="text-red-500">*</span></div>
                </div>
                <button onClick={handleSubmit} disabled={loading} className="w-full bg-indigo-600 active:bg-indigo-700 text-white mt-1 py-4 rounded-xl font-bold shadow-lg shadow-indigo-500/30 active:scale-[0.98] transition-all flex justify-center items-center gap-2 border-none outline-none">
                  {loading ? <i className="fas fa-circle-notch fa-spin"></i> : <span>Add to Inventory</span>}
                </button>
              </div>
            </div>
          </div>
        </PortalModal>
      );
    };

    const PatientFormModal = ({ isOpen, onClose, hospitalId, user, onSuccess }) => {
      const [form, setForm] = useState({ id: '', name: '', room: '', bed: '' });
      const [loading, setLoading] = useState(false);
      const [deviceStatus, setDeviceStatus] = useState('idle');
      const [alertPrefs, setAlertPrefs] = useState(DEFAULT_PERCENT_ALERTS);
      const [mlAlerts, setMlAlerts] = useState(true);

      useEffect(() => {
        document.body.classList.toggle('modal-open', isOpen);
        if (isOpen) {
          setForm({ id: '', name: '', room: '', bed: '' });
          setLoading(false);
          setDeviceStatus('idle');
          setAlertPrefs(DEFAULT_PERCENT_ALERTS);
          setMlAlerts(true);
        }
        return () => document.body.classList.remove('modal-open');
      }, [isOpen]);

      useEffect(() => {
        const did = form.id.trim().toUpperCase();
        if (did.length < 3) { setDeviceStatus('idle'); return; }
        setDeviceStatus('checking');
        let cancelled = false;
        const verifyDevice = async () => {
          try {
            const hRef = db.ref(`hospitals/${hospitalId}`);
            const regSnap = await hRef.child(`registered_devices/${did}`).once('value');
            if (cancelled) return;
            if (!regSnap.exists() || regSnap.val() === null) { setDeviceStatus('invalid'); return; }
            const activeSnap = await hRef.child(`active_devices/${did}`).once('value');
            if (cancelled) return;
            if (activeSnap.exists() && activeSnap.val() !== null) { setDeviceStatus('in_use'); return; }
            setDeviceStatus('valid');
          } catch (e) {
            if (!cancelled) setDeviceStatus('idle');
          }
        };
        const timeoutId = setTimeout(verifyDevice, 450);
        return () => { cancelled = true; clearTimeout(timeoutId); };
      }, [form.id, hospitalId]);

      const toggleAlert = (level) => setAlertPrefs(prev => ({ ...prev, [level]: !prev[level] }));

      const handleSubmit = async () => {
        const did = form.id.trim().toUpperCase();
        if (!did || !form.room || !form.bed) { alert('Device ID, Room Number, and Bed Number are mandatory.'); return; }
        if (deviceStatus !== 'valid') { alert('Action blocked. Ensure you are using a valid, registered device ID that is currently idle.'); return; }
        setLoading(true);
        try {
          const hRef = db.ref(`hospitals/${hospitalId}`);
          const regSnap = await hRef.child(`registered_devices/${did}`).once('value');
          if (!regSnap.exists() || regSnap.val() === null) { alert(`ACCESS DENIED: The Device ID "${did}" is strictly NOT registered to your hospital's inventory.`); setDeviceStatus('invalid'); setLoading(false); return; }
          const activeSnap = await hRef.child(`active_devices/${did}`).once('value');
          if (activeSnap.exists() && activeSnap.val() !== null) { alert(`ERROR: Device "${did}" is already in use by another patient.`); setDeviceStatus('in_use'); setLoading(false); return; }

          await hRef.child(`active_devices/${did}`).set({
            deviceId: did,
            patientName: form.name.trim() || '',
            room: form.room,
            bed: form.bed,
            nurseId: user.uid,
            nurseName: user.name || 'Staff',
            startTime: Date.now(),
            lastUpdate: Date.now(),
            perc: 100,
            mlLeft: DEFAULT_TOTAL_ML,
            minsLeft: 60,
            secsLeft: 0,
            rawWeight: 0,
            fluidWeight: 0,
            flowRate: 0,
            deviceOnline: true,
            autoDischargeAt: Date.now() + INFUSION_DURATION_MS,
            notificationSettings: { mode: 'both', percentAlerts: alertPrefs, mlAlerts }
          });

          setForm({ id: '', name: '', room: '', bed: '' });
          setDeviceStatus('idle');
          onSuccess();
          onClose();
        } catch (e) {
          alert('Database Error: ' + e.message);
        }
        setLoading(false);
      };

      if (!isOpen) return null;
      const isButtonDisabled = loading || deviceStatus !== 'valid';
      let buttonContent = <span>Enter Valid ID</span>;
      let buttonClass = 'bg-slate-200 text-slate-400 shadow-none cursor-not-allowed pointer-events-none';
      if (loading) buttonContent = <i className="fas fa-circle-notch fa-spin"></i>;
      else if (deviceStatus === 'valid') { buttonContent = <span>Start Monitoring</span>; buttonClass = 'bg-blue-600 active:bg-blue-700 text-white shadow-blue-500/30 active:scale-[0.98]'; }
      else if (deviceStatus === 'checking') buttonContent = <span>Verifying...</span>;
      else if (deviceStatus === 'invalid') { buttonContent = <span>Unregistered ID</span>; buttonClass = 'bg-red-100 text-red-400 shadow-none cursor-not-allowed pointer-events-none'; }
      else if (deviceStatus === 'in_use') { buttonContent = <span>Device In Use</span>; buttonClass = 'bg-amber-100 text-amber-500 shadow-none cursor-not-allowed pointer-events-none'; }

      return (
        <PortalModal open={isOpen}>
          <div className="fixed inset-0 z-[999999] w-screen h-screen bg-black/80 backdrop-blur-md flex items-center justify-center p-4 m-0 fade-in">
            <div className="bg-white w-[92vw] max-w-sm rounded-3xl p-6 shadow-2xl relative border-0 outline-none max-h-[92vh] overflow-y-auto hide-scroll mx-auto">
              <div className="flex justify-between items-center mb-6 gap-3">
                <div className="min-w-0">
                  <h3 className="font-extrabold text-slate-800 text-xl">New Infusion</h3>
                  <p className="text-xs font-medium text-slate-400 mt-1">Connect device to patient bed</p>
                </div>
                <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-100 text-slate-500 active:bg-slate-200 transition-colors flex items-center justify-center border-none"><i className="fas fa-times text-sm"></i></button>
              </div>

              <div className="space-y-4">
                <div className="relative">
                  <input value={form.id} onChange={e=>setForm({...form, id:e.target.value.toUpperCase()})} placeholder="e.g. KN0326001" className={`w-full p-4 bg-slate-100 focus:bg-slate-200 rounded-xl font-mono text-center text-xl font-bold tracking-widest uppercase transition-colors border-2 ${deviceStatus === 'valid' ? 'border-emerald-400 bg-emerald-50' : deviceStatus === 'invalid' || deviceStatus === 'in_use' ? 'border-red-400 bg-red-50' : 'border-transparent'}`} autoFocus />
                  {deviceStatus === 'checking' && <div className="absolute right-4 top-5 text-blue-500"><i className="fas fa-circle-notch fa-spin text-lg"></i></div>}
                  {deviceStatus === 'valid' && <div className="absolute right-4 top-5 text-emerald-500"><i className="fas fa-check-circle text-xl"></i></div>}
                  {deviceStatus === 'invalid' && <div className="absolute right-4 top-5 text-red-500"><i className="fas fa-times-circle text-xl"></i></div>}
                  {deviceStatus === 'in_use' && <div className="absolute right-4 top-5 text-amber-500"><i className="fas fa-exclamation-triangle text-xl"></i></div>}
                  <div className="text-[10px] uppercase tracking-wider text-center mt-2 h-4 flex justify-center items-center">
                    {deviceStatus === 'idle' && <span className="text-slate-400 font-bold">Unique Device ID <span className="text-red-500">*</span></span>}
                    {deviceStatus === 'checking' && <span className="text-blue-500 font-bold">Verifying Allocation...</span>}
                    {deviceStatus === 'valid' && <span className="text-emerald-500 font-bold">Device Allocated & Available</span>}
                    {deviceStatus === 'invalid' && <span className="text-red-600 font-black">WRONG ID! This ID is not in your inventory.</span>}
                    {deviceStatus === 'in_use' && <span className="text-amber-500 font-bold">Device is already in use!</span>}
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <input value={form.room} onChange={e=>setForm({...form, room:e.target.value})} placeholder="Room 101" className="w-full p-3.5 bg-slate-100 focus:bg-slate-200 rounded-xl text-sm font-bold text-slate-700 transition-colors" />
                    <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 ml-1">Room No <span className="text-red-500">*</span></div>
                  </div>
                  <div>
                    <input value={form.bed} onChange={e=>setForm({...form, bed:e.target.value})} placeholder="Bed A" className="w-full p-3.5 bg-slate-100 focus:bg-slate-200 rounded-xl text-sm font-bold text-slate-700 transition-colors" />
                    <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 ml-1">Bed No <span className="text-red-500">*</span></div>
                  </div>
                </div>

                <div className="pt-1">
                  <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Patient Name (Optional)" className="w-full p-3.5 bg-slate-100 focus:bg-slate-200 rounded-xl text-sm font-medium text-slate-700 placeholder-slate-400 transition-colors" />
                </div>


                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                  <div className="flex items-center justify-between mb-3 gap-3">
                    <div>
                      <div className="text-[10px] uppercase tracking-wider font-extrabold text-slate-500">Percentage alerts</div>
                      <div className="text-xs text-slate-400 mt-1">Turn percentage notifications on or off</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    {ALERT_LEVELS.map(level => {
                      const on = alertPrefs[level] !== false;
                      return (
                        <button key={level} type="button" onClick={() => toggleAlert(level)} className={`rounded-xl px-3 py-2 text-xs font-extrabold border transition-all ${on ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-slate-100 border-slate-200 text-slate-400'}`}>
                          {level}% {on ? 'On' : 'Off'}
                        </button>
                      );
                    })}
                  </div>
                  <div className="mt-3 flex items-center gap-2">
                    <button type="button" onClick={() => setMlAlerts(v => !v)} className={`rounded-xl px-3 py-2 text-xs font-extrabold border transition-all ${mlAlerts ? 'bg-blue-50 border-blue-300 text-blue-700' : 'bg-slate-100 border-slate-200 text-slate-400'}`}>
                      100ml alerts {mlAlerts ? 'On' : 'Off'}
                    </button>
                    <div className="text-[10px] text-slate-400 font-semibold">Notification format: <span className="font-bold text-slate-700">ml + % + ETA</span></div>
                  </div>
                </div>

                <button onClick={handleSubmit} disabled={isButtonDisabled} className={`w-full mt-1 py-4 rounded-xl font-bold shadow-lg transition-all flex justify-center items-center gap-2 border-none outline-none ${buttonClass}`}>
                  {buttonContent}
                </button>
              </div>
            </div>
          </div>
        </PortalModal>
      );
    };

    const SuccessCredentialsModal = ({ isOpen, creds, onClose }) => {
      useEffect(() => { document.body.classList.toggle('modal-open', isOpen); return () => document.body.classList.remove('modal-open'); }, [isOpen]);
      if (!isOpen || !creds) return null;
      return (
        <PortalModal open={isOpen}>
          <div className="fixed inset-0 z-[999999] w-screen h-screen bg-black/80 backdrop-blur-md flex items-center justify-center p-4 m-0 fade-in">
            <div className="bg-white w-[95vw] max-w-sm rounded-2xl shadow-2xl relative overflow-hidden border-none outline-none mx-auto">
              <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-8 text-center">
                <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-check text-3xl"></i></div>
                <h3 className="text-2xl font-extrabold tracking-tight">Account Created!</h3>
              </div>
              <div className="p-7 space-y-4">
                <div className="bg-slate-50 p-4 rounded-xl border-none"><p className="text-[10px] font-bold tracking-widest text-slate-400 mb-1 uppercase">Email Address</p><p className="font-mono font-bold text-slate-800 break-all">{creds.email}</p></div>
                <div className="bg-slate-50 p-4 rounded-xl border-none"><p className="text-[10px] font-bold tracking-widest text-slate-400 mb-1 uppercase">Initial Password</p><p className="font-mono font-bold text-slate-800 tracking-wider">{creds.password}</p></div>
                <button onClick={async () => { try { await copyText(`Email: ${creds.email}\nPassword: ${creds.password}`); alert('Copied!'); } catch (error) { alert('Copy failed. Please copy the credentials manually.'); } }} className="w-full bg-slate-900 active:bg-slate-800 text-white py-4 rounded-xl font-bold transition-colors border-none outline-none">Copy Credentials</button>
                <button onClick={onClose} className="w-full text-slate-500 active:text-slate-800 py-2 font-bold transition-colors border-none outline-none">Done</button>
              </div>
            </div>
          </div>
        </PortalModal>
      );
    };

    const AddNurseModal = ({ isOpen, onClose, hospitalId, hospitalDomain, onSuccess }) => {
      const [form, setForm] = useState({ name: '', password: '' });
      const [loading, setLoading] = useState(false);
      const [generatedEmail, setGeneratedEmail] = useState('');
      const [showSuccess, setShowSuccess] = useState(false);
      const [creds, setCreds] = useState(null);

      useEffect(() => { document.body.classList.toggle('modal-open', isOpen); return () => document.body.classList.remove('modal-open'); }, [isOpen]);
      useEffect(() => { setGeneratedEmail(form.name ? `${slugify(form.name)}@${hospitalDomain}` : ''); }, [form.name, hospitalDomain]);

      const handleSubmit = async () => {
        const cleanName = form.name.trim();
        if (!cleanName || !form.password || form.password.length < 6) { alert('Please fill all required fields. Password must be at least 6 characters.'); return; }
        if (!generatedEmail) { alert('Enter a valid name to generate staff email.'); return; }

        setLoading(true);
        const secondaryAuth = getSecondaryAuth();
        try {
          const nursesSnap = await db.ref(`hospitals/${hospitalId}/nurses`).once('value');
          let duplicateName = false;
          let duplicateEmail = false;
          nursesSnap.forEach(child => {
            const n = child.val() || {};
            if (normalizeName(n.name) === normalizeName(cleanName)) duplicateName = true;
            if (String(n.email || '').toLowerCase() === String(generatedEmail).toLowerCase()) duplicateEmail = true;
          });

          if (duplicateName) { alert('A staff member with this name already exists. Please use a different name.'); setLoading(false); return; }
          if (duplicateEmail) { alert('This staff email already exists in the hospital database. Please use a different name.'); setLoading(false); return; }

          await secondaryAuth.setPersistence(firebase.auth.Auth.Persistence.NONE);
          const userCredential = await secondaryAuth.createUserWithEmailAndPassword(generatedEmail, form.password);
          const uid = userCredential.user.uid;

          await db.ref(`hospitals/${hospitalId}/nurses/${uid}`).set({
            name: cleanName,
            email: generatedEmail,
            uid,
            joined: Date.now(),
            role: 'nurse',
            disabled: false,
            disabledAt: null,
            passwordChangeStatus: 'none'
          });

          setCreds({ email: generatedEmail, password: form.password });
          setShowSuccess(true);
          setForm({ name: '', password: '' });
          onSuccess();
        } catch (e) {
          alert(e.message);
        } finally {
          try { if (secondaryAuth.currentUser) await secondaryAuth.signOut(); } catch (e) {}
        }
        setLoading(false);
      };

      if (!isOpen) return null;
      return (
        <>
          <PortalModal open={isOpen}>
            <div className="fixed inset-0 z-[999999] w-screen h-screen bg-black/80 backdrop-blur-md flex items-center justify-center p-4 m-0 fade-in">
              <div className="bg-white w-[95vw] max-w-sm rounded-2xl p-6 shadow-2xl relative border-0 outline-none mx-auto">
                <div className="flex justify-between items-center mb-6">
                  <div>
                    <h3 className="font-extrabold text-slate-800 text-xl">Register Staff</h3>
                    <p className="text-xs font-medium text-slate-400 mt-1">Add new staff credentials</p>
                  </div>
                  <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-100 text-slate-500 active:bg-slate-200 transition-colors flex items-center justify-center border-none"><i className="fas fa-times text-sm"></i></button>
                </div>

                <div className="space-y-4">
                  <div className="relative">
                    <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="e.g. Jane Doe" className="w-full p-4 bg-slate-100 focus:bg-slate-200 rounded-xl font-medium text-center text-xl tracking-wide transition-colors" autoFocus />
                    <div className="text-[10px] uppercase tracking-wider font-bold text-center text-slate-400 mt-2">Full Name <span className="text-red-500">*</span></div>
                  </div>

                  <div className="grid grid-cols-1 gap-3">
                    <div>
